version: "3.9"

services:
  # Next.js Frontend
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - floworio

  # FastAPI Backend
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_BASE_URL=http://localhost:8000
      - FRONTEND_URL=http://localhost:3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TIKTOK_ACCESS_TOKEN=${TIKTOK_ACCESS_TOKEN}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
      - INSTAGRAM_USER_ID=${INSTAGRAM_USER_ID}
    volumes:
      - ../apps/api:/app
      - api_renders:/app/renders
      - api_audio:/app/audio
      - api_uploads:/app/uploads
    networks:
      - floworio

  # Redis (for production job queue)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - floworio

volumes:
  api_renders:
  api_audio:
  api_uploads:

networks:
  floworio:
    driver: bridge
